name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string
      prerelease:
        description: Mark the release as unstable
        required: false
        default: false
        type: boolean
      release_name:
        description: Optional release title override
        required: false
        type: string

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      release_name: ${{ steps.resolve.outputs.release_name }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          set -euo pipefail

          release_tag="${INPUT_TAG:-}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          fi

          prerelease="${INPUT_PRERELEASE:-false}"
          release_name="${INPUT_RELEASE_NAME:-${release_tag}}"

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "ref=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

  release:
    needs: resolve-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Check if release already exists
        id: release_state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ needs.resolve-release.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run GoReleaser
        if: github.event_name == 'push' || steps.release_state.outputs.exists != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release metadata
        if: needs.resolve-release.outputs.prerelease == 'true' || needs.resolve-release.outputs.release_name != needs.resolve-release.outputs.tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(--title "${{ needs.resolve-release.outputs.release_name }}")
          if [[ "${{ needs.resolve-release.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release edit "${{ needs.resolve-release.outputs.tag }}" "${args[@]}"

  macos-installers:
    needs:
      - resolve-release
      - release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@v5

      - name: Warn when macOS signing is not configured
        env:
          APPLE_INSTALLER_CERTIFICATE_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          missing=()

          [[ -n "${APPLE_INSTALLER_CERTIFICATE_P12}" ]] || missing+=("APPLE_INSTALLER_CERTIFICATE_P12")
          [[ -n "${APPLE_INSTALLER_CERTIFICATE_PASSWORD}" ]] || missing+=("APPLE_INSTALLER_CERTIFICATE_PASSWORD")
          [[ -n "${APPLE_INSTALLER_SIGNING_IDENTITY}" ]] || missing+=("APPLE_INSTALLER_SIGNING_IDENTITY")
          [[ -n "${APPLE_NOTARY_APPLE_ID}" ]] || missing+=("APPLE_NOTARY_APPLE_ID")
          [[ -n "${APPLE_NOTARY_TEAM_ID}" ]] || missing+=("APPLE_NOTARY_TEAM_ID")
          [[ -n "${APPLE_NOTARY_PASSWORD}" ]] || missing+=("APPLE_NOTARY_PASSWORD")

          if [[ ${#missing[@]} -gt 0 ]]; then
            printf '::warning::macOS installer will be unsigned or unnotarized because these secrets are missing: %s\n' "$(IFS=', '; echo "${missing[*]}")"
          fi

      - name: Import Apple installer certificate
        if: secrets.APPLE_INSTALLER_CERTIFICATE_P12 != '' && secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD != '' && secrets.APPLE_INSTALLER_SIGNING_IDENTITY != ''
        env:
          APPLE_INSTALLER_CERTIFICATE_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          keychain_path="${RUNNER_TEMP}/moodle-release.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          certificate_path="${RUNNER_TEMP}/moodle-installer-cert.p12"

          printf '%s' "${APPLE_INSTALLER_CERTIFICATE_P12}" | base64 --decode > "${certificate_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -k "${keychain_path}" \
            -P "${APPLE_INSTALLER_CERTIFICATE_PASSWORD}" \
            -f pkcs12 \
            -A
          security list-keychains -d user -s "${keychain_path}" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "${keychain_password}" "${keychain_path}"

          {
            echo "MACOS_SIGNING_KEYCHAIN=${keychain_path}"
            echo "MACOS_SIGNING_KEYCHAIN_PASSWORD=${keychain_password}"
          } >> "${GITHUB_ENV}"

      - name: Download release archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/downloads
          gh release download "${{ needs.resolve-release.outputs.tag }}" \
            --pattern "moodle_darwin_${{ matrix.arch }}.tar.gz" \
            --dir dist/downloads

      - name: Build PKG installer
        env:
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
        run: |
          mkdir -p dist/installers
          signing_args=()
          if [[ -n "${APPLE_INSTALLER_SIGNING_IDENTITY}" ]]; then
            signing_args+=(--signing-identity "${APPLE_INSTALLER_SIGNING_IDENTITY}")
          fi
          bash packaging/macos/build-pkg.sh \
            --archive "dist/downloads/moodle_darwin_${{ matrix.arch }}.tar.gz" \
            --version "${{ needs.resolve-release.outputs.tag }}" \
            --output "dist/installers/moodle_darwin_${{ matrix.arch }}.pkg" \
            "${signing_args[@]}"

      - name: Notarize PKG installer
        if: secrets.APPLE_INSTALLER_SIGNING_IDENTITY != '' && secrets.APPLE_NOTARY_APPLE_ID != '' && secrets.APPLE_NOTARY_TEAM_ID != '' && secrets.APPLE_NOTARY_PASSWORD != ''
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          pkg_path="dist/installers/moodle_darwin_${{ matrix.arch }}.pkg"
          xcrun notarytool submit "${pkg_path}" \
            --apple-id "${APPLE_NOTARY_APPLE_ID}" \
            --team-id "${APPLE_NOTARY_TEAM_ID}" \
            --password "${APPLE_NOTARY_PASSWORD}" \
            --wait
          xcrun stapler staple "${pkg_path}"

      - name: Build DMG installer
        run: |
          mkdir -p dist/installers
          bash packaging/macos/create-dmg.sh \
            --version "${{ needs.resolve-release.outputs.tag }}" \
            --pkg "dist/installers/moodle_darwin_${{ matrix.arch }}.pkg" \
            --output "dist/installers/moodle_darwin_${{ matrix.arch }}.dmg"

      - name: Upload DMG installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.resolve-release.outputs.tag }}" \
            "dist/installers/moodle_darwin_${{ matrix.arch }}.dmg" \
            --clobber

      - name: Clean up Apple signing keychain
        if: always() && env.MACOS_SIGNING_KEYCHAIN != ''
        run: |
          security delete-keychain "${MACOS_SIGNING_KEYCHAIN}" || true

  windows-installers:
    needs:
      - resolve-release
      - release
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Download release archive
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path dist\downloads | Out-Null
          gh release download "${{ needs.resolve-release.outputs.tag }}" `
            --pattern "moodle_windows_${{ matrix.arch }}.zip" `
            --dir dist\downloads

      - name: Build EXE installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist\installers | Out-Null
          .\packaging\windows\build-installer.ps1 `
            -ArchivePath "dist\downloads\moodle_windows_${{ matrix.arch }}.zip" `
            -Version "${{ needs.resolve-release.outputs.tag }}" `
            -Arch "${{ matrix.arch }}" `
            -OutputDir "dist\installers"

      - name: Upload EXE installer
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.resolve-release.outputs.tag }}" `
            "dist\installers\moodle_windows_${{ matrix.arch }}_setup.exe" `
            --clobber
