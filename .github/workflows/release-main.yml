name: Release From Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Create and push next tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          existing_tag="$(git tag --points-at HEAD --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -n "${existing_tag}" ]]; then
            echo "HEAD already tagged with ${existing_tag}"
            exit 0
          fi

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            major="${version%%.*}"
            rest="${version#*.}"
            minor="${rest%%.*}"
            patch="${rest##*.}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${next_tag}" -m "Release ${next_tag}"
          git push origin "${next_tag}"
